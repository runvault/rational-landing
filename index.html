<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rational</title>
  <meta name="description" content="AI systems for industries where getting it wrong isn't an option.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>R</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Droid+Serif:wght@400;700&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .logo {
      font-family: 'Droid Serif', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      margin-bottom: 3rem;
      color: #111;
    }

    main {
      max-width: 600px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 2.5rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 1rem;
    }

    p {
      font-size: clamp(1rem, 2.5vw, 1.125rem);
      font-weight: 400;
      color: #555;
      line-height: 1.6;
    }

    .download-link {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: #111;
      text-decoration: none;
      border: 1px solid #ddd;
      border-radius: 4px;
      transition: all 0.2s ease;
    }

    .download-link:hover {
      background: #111;
      color: #fff;
      border-color: #111;
    }
  </style>
</head>
<body>
  <div class="logo">Rational</div>
  <main>
    <h1>AI that earns trust.</h1>
    <p>Rational builds intelligent systems to complement industries where human expertise is of utmost value.</p>
  </main>
</body>
</html>
